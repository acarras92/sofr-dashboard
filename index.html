<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFR Forward Curve Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1419;
    color: #e1e8ed;
    min-height: 100vh;
    padding: 24px;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid #2a3040;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 14px;
    color: #8899a6;
  }
  .header .updated {
    font-size: 13px;
    color: #5c6e7e;
    margin-top: 4px;
  }

  /* KPI Cards */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .kpi-card {
    background: #1a1f2e;
    border-radius: 10px;
    padding: 18px 20px;
    border: 1px solid #2a3040;
  }
  .kpi-card .label {
    font-size: 12px;
    color: #8899a6;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .kpi-card .value {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
  }
  .kpi-card .change {
    font-size: 13px;
    margin-top: 4px;
    font-weight: 500;
  }
  .kpi-card .change.positive { color: #e74c3c; }
  .kpi-card .change.negative { color: #2ecc71; }
  .kpi-card .change.neutral { color: #8899a6; }
  .kpi-card.shape .value { font-size: 20px; }
  .kpi-card.shape .spread { font-size: 13px; color: #8899a6; margin-top: 2px; }

  /* Charts */
  .chart-container {
    background: #1a1f2e;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid #2a3040;
  }
  .chart-container h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #fff;
  }
  .chart-wrap {
    position: relative;
    height: 350px;
  }
  .chart-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .chart-controls button {
    background: #252b3b;
    color: #8899a6;
    border: 1px solid #2a3040;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chart-controls button:hover,
  .chart-controls button.active {
    background: #3b82f6;
    color: #fff;
    border-color: #3b82f6;
  }

  /* Data Table */
  .table-container {
    background: #1a1f2e;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid #2a3040;
    overflow-x: auto;
  }
  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .table-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  .btn-export {
    background: #252b3b;
    color: #8899a6;
    border: 1px solid #2a3040;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-export:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 10px 14px;
    color: #8899a6;
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #2a3040;
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid #1e2536;
    color: #e1e8ed;
  }
  tr:hover td { background: #1e2536; }
  .rate-up { color: #e74c3c; }
  .rate-down { color: #2ecc71; }

  /* Context Panel */
  .context-panel {
    background: #1a1f2e;
    border-radius: 10px;
    padding: 24px;
    border: 1px solid #2a3040;
    margin-bottom: 24px;
  }
  .context-panel h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #fff;
  }
  .context-panel p {
    font-size: 14px;
    color: #8899a6;
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .context-panel strong { color: #e1e8ed; }

  .loading {
    text-align: center;
    padding: 60px;
    color: #5c6e7e;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>SOFR Forward Curve Tracker</h1>
  <div class="subtitle">Source: Chatham Financial | Updated daily at market open</div>
  <div class="updated" id="lastUpdated">Loading...</div>
</div>

<div class="kpi-row" id="kpiRow"></div>

<div class="chart-container">
  <h2>Forward SOFR Curve</h2>
  <div class="chart-controls" id="curveToggles"></div>
  <div class="chart-wrap"><canvas id="curveChart"></canvas></div>
</div>

<div class="chart-container">
  <h2>Rate Trends Over Time</h2>
  <div class="chart-controls" id="trendRange"></div>
  <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
</div>

<div class="chart-container">
  <h2>Curve Steepness: 2Y-10Y Spread (bps)</h2>
  <div class="chart-wrap"><canvas id="spreadChart"></canvas></div>
</div>

<div class="table-container">
  <div class="table-header">
    <h2>Full Rate Table</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn-export" onclick="downloadTableCSV()">Download CSV</button>
      <a class="btn-export" href="data/sofr_latest.csv" download style="text-decoration:none;display:inline-flex;align-items:center;">Latest CSV (raw)</a>
    </div>
  </div>
  <table id="rateTable">
    <thead>
      <tr>
        <th>Month</th>
        <th>Year</th>
        <th>SOFR Rate</th>
        <th>vs Previous Day (bps)</th>
      </tr>
    </thead>
    <tbody id="rateTableBody"></tbody>
  </table>
</div>

<div class="context-panel" id="contextPanel"></div>

<script>
const DATA_URL = 'data/sofr_history.json';
const LATEST_URL = 'data/sofr_latest.json';

let historyData = [];
let latestData = null;
let curveChart, trendChart, spreadChart;

// ─── Helpers for both old (object) and new (array) forwardCurve formats ────

// Old tenor key → months offset from today
const TENOR_MONTHS = { '0M': 0, '1M': 1, '3M': 3, '6M': 6, '9M': 9, '12M': 12, '18M': 18,
  '1Y': 12, '2Y': 24, '3Y': 36, '4Y': 48, '5Y': 60, '6Y': 72, '7Y': 84, '8Y': 96, '10Y': 120, '12Y': 144, '15Y': 180, '20Y': 240, '30Y': 360 };

// Given a snapshot, extract the SOFR rate at a specific month offset (0 = nearest month)
function getRateAtOffset(snap, offsetMonths) {
  if (!snap) return null;
  if (Array.isArray(snap.forwardCurve)) {
    // New array format — index roughly equals month offset (array is monthly, sorted)
    const pt = snap.forwardCurve[offsetMonths];
    return pt ? pt.sofr : null;
  }
  // Old object format — find the tenor key closest to the requested offset
  const tenorKey = Object.entries(TENOR_MONTHS)
    .filter(([k]) => snap.swapRates?.[k] != null || snap.forwardCurve?.[k] != null || snap.termSOFR?.[k] != null)
    .sort((a, b) => Math.abs(a[1] - offsetMonths) - Math.abs(b[1] - offsetMonths))[0];
  if (!tenorKey) return null;
  const k = tenorKey[0];
  return snap.swapRates?.[k] ?? snap.forwardCurve?.[k] ?? snap.termSOFR?.[k] ?? null;
}

// Get the forward curve as a normalized array of { date, year, month, sofr }
function getCurveArray(snap) {
  if (!snap) return [];
  if (Array.isArray(snap.forwardCurve)) return snap.forwardCurve;
  // Convert old object format to array using TENOR_MONTHS offsets
  const now = new Date(snap.date);
  const entries = [];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const allKeys = { ...snap.forwardCurve };
  for (const [key, offset] of Object.entries(TENOR_MONTHS)) {
    const rate = snap.forwardCurve?.[key] ?? snap.swapRates?.[key] ?? null;
    if (rate == null) continue;
    const d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    entries.push({ date: `${MONTH_NAMES[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`, year: d.getFullYear(), month: d.getMonth() + 1, sofr: rate, _offset: offset });
  }
  // Dedupe by offset, sort
  const seen = new Set();
  return entries.filter(e => { if (seen.has(e._offset)) return false; seen.add(e._offset); return true; })
    .sort((a, b) => (a.year * 12 + a.month) - (b.year * 12 + b.month));
}

function findByOffset(data, latest, days) {
  const target = new Date(latest.date);
  target.setDate(target.getDate() - days);
  let best = null;
  for (const d of data) {
    const dd = new Date(d.date);
    if (dd <= target) {
      if (!best || dd > new Date(best.date)) best = d;
    }
  }
  return best;
}

function bpsChange(current, previous) {
  if (current == null || previous == null) return null;
  return Math.round((current - previous) * 100);
}

function formatBps(bps) {
  if (bps == null) return { text: '--', cls: 'neutral' };
  const sign = bps > 0 ? '+' : '';
  const cls = bps > 0 ? 'positive' : bps < 0 ? 'negative' : 'neutral';
  return { text: `${sign}${bps} bps`, cls };
}

async function loadData() {
  try {
    const [histRes, latestRes] = await Promise.all([fetch(DATA_URL), fetch(LATEST_URL)]);
    historyData = await histRes.json();
    latestData = await latestRes.json();
  } catch (e) {
    try {
      const res = await fetch(DATA_URL);
      historyData = await res.json();
      latestData = historyData[historyData.length - 1];
    } catch (e2) {
      document.body.innerHTML = '<div class="loading">Failed to load data. Check that data files exist.</div>';
      return;
    }
  }
  renderAll();
}

function renderAll() {
  const prev = historyData.length >= 2 ? historyData[historyData.length - 2] : null;

  document.getElementById('lastUpdated').textContent =
    `Last updated: ${latestData.date} at ${new Date(latestData.timestamp).toLocaleTimeString()} — ${latestData.source || ''}`;

  renderKPIs(prev);
  renderCurveChart();
  renderTrendChart('All');
  renderSpreadChart();
  renderTable(prev);
  renderContext();
}

// ─── KPI Cards ────────────────────────────────────────────────────────────────

function renderKPIs(prev) {
  const container = document.getElementById('kpiRow');
  const curve = getCurveArray(latestData);
  const cards = [];

  // Near-term SOFR (first point in curve)
  const nearRate = curve[0]?.sofr ?? null;
  const prevNearRate = getRateAtOffset(prev, 0);
  cards.push(kpiCard('Near-Term SOFR', nearRate != null ? nearRate.toFixed(2) + '%' : '--', bpsChange(nearRate, prevNearRate)));

  // 1Y out (index 12)
  const r1y = getRateAtOffset(latestData, 12);
  const p1y = getRateAtOffset(prev, 12);
  cards.push(kpiCard('1Y Forward', r1y != null ? r1y.toFixed(2) + '%' : '--', bpsChange(r1y, p1y)));

  // 3Y out (index 36)
  const r3y = getRateAtOffset(latestData, 36);
  const p3y = getRateAtOffset(prev, 36);
  cards.push(kpiCard('3Y Forward', r3y != null ? r3y.toFixed(2) + '%' : '--', bpsChange(r3y, p3y)));

  // 5Y out (index 60)
  const r5y = getRateAtOffset(latestData, 60);
  const p5y = getRateAtOffset(prev, 60);
  cards.push(kpiCard('5Y Forward', r5y != null ? r5y.toFixed(2) + '%' : '--', bpsChange(r5y, p5y)));

  // 10Y out (index 120)
  const r10y = getRateAtOffset(latestData, 120);
  const p10y = getRateAtOffset(prev, 120);
  cards.push(kpiCard('10Y Forward', r10y != null ? r10y.toFixed(2) + '%' : '--', bpsChange(r10y, p10y)));

  // Curve shape: 2Y vs 10Y
  const r2y = getRateAtOffset(latestData, 24);
  let shapeLabel = '--', spreadBps = null;
  if (r2y != null && r10y != null) {
    spreadBps = Math.round((r10y - r2y) * 100);
    if (spreadBps < -10) shapeLabel = 'Inverted';
    else if (spreadBps > 10) shapeLabel = 'Normal';
    else shapeLabel = 'Flat';
  }
  cards.push(`<div class="kpi-card shape">
    <div class="label">Curve Shape</div>
    <div class="value">${shapeLabel}</div>
    <div class="spread">${spreadBps != null ? (spreadBps > 0 ? '+' : '') + spreadBps + ' bps (2Y-10Y)' : ''}</div>
  </div>`);

  container.innerHTML = cards.join('');
}

function kpiCard(label, value, bps) {
  const chg = formatBps(bps);
  return `<div class="kpi-card">
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    <div class="change ${chg.cls}">${chg.text}</div>
  </div>`;
}

// ─── Forward Curve Chart ──────────────────────────────────────────────────────

function renderCurveChart() {
  const ctx = document.getElementById('curveChart').getContext('2d');
  const curve = getCurveArray(latestData);
  const labels = curve.map(pt => pt.date);
  const values = curve.map(pt => pt.sofr);

  const datasets = [{
    label: `Today (${latestData.date})`,
    data: values,
    borderColor: '#3b82f6',
    backgroundColor: 'rgba(59,130,246,0.1)',
    borderWidth: 2,
    pointRadius: curve.length > 50 ? 0 : 3,
    pointHoverRadius: 5,
    pointBackgroundColor: '#3b82f6',
    tension: 0.3,
    fill: true
  }];

  // Historical overlays — map old-format snapshots onto the same x-axis by matching month labels
  const overlays = [
    { days: 1, label: 'Previous Day', color: '#eab308', dash: [6, 3] },
    { days: 7, label: '1 Week Ago', color: '#f97316', dash: [6, 3] },
  ];

  const toggleContainer = document.getElementById('curveToggles');
  toggleContainer.innerHTML = '';

  overlays.forEach(ov => {
    const snap = findByOffset(historyData, latestData, ov.days);
    if (snap) {
      const snapCurve = getCurveArray(snap);
      // Build a lookup by date label
      const lookup = {};
      snapCurve.forEach(pt => { lookup[pt.date] = pt.sofr; });
      const vals = labels.map(lbl => lookup[lbl] ?? null);
      // Only add if there's at least some overlap
      if (vals.some(v => v != null)) {
        datasets.push({
          label: `${ov.label} (${snap.date})`,
          data: vals,
          borderColor: ov.color,
          borderWidth: 1.5,
          borderDash: ov.dash,
          pointRadius: 0,
          pointBackgroundColor: ov.color,
          tension: 0.3,
          fill: false,
          spanGaps: false
        });
      }
    }
  });

  if (curveChart) curveChart.destroy();
  curveChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color: '#8899a6', font: { size: 12 } } },
        tooltip: {
          backgroundColor: '#1a1f2e',
          titleColor: '#fff',
          bodyColor: '#e1e8ed',
          borderColor: '#2a3040',
          borderWidth: 1,
          callbacks: {
            label: function(item) {
              return `${item.dataset.label}: ${item.raw != null ? item.raw.toFixed(4) + '%' : '--'}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#5c6e7e',
            maxTicksLimit: 20,
            maxRotation: 45,
            minRotation: 25
          },
          grid: { color: '#1e2536' }
        },
        y: {
          ticks: { color: '#5c6e7e', callback: v => v.toFixed(2) + '%' },
          grid: { color: '#1e2536' }
        }
      }
    }
  });
}

// ─── Rate Trends Over Time ────────────────────────────────────────────────────

let currentTrendRange = 'All';

function renderTrendChart(range) {
  currentTrendRange = range;
  const ctx = document.getElementById('trendChart').getContext('2d');

  const now = new Date(latestData.date);
  let cutoff = new Date(now);
  if (range === '1M') cutoff.setMonth(cutoff.getMonth() - 1);
  else if (range === '3M') cutoff.setMonth(cutoff.getMonth() - 3);
  else if (range === '6M') cutoff.setMonth(cutoff.getMonth() - 6);
  else if (range === '1Y') cutoff.setFullYear(cutoff.getFullYear() - 1);
  else cutoff = new Date('2000-01-01');

  const filtered = range === 'All' ? historyData : historyData.filter(d => new Date(d.date) >= cutoff);
  const labels = filtered.map(d => d.date);

  // Plot key tenor offsets over time across all snapshots
  const series = [
    { offset: 12, label: '1Y Forward', color: '#3b82f6' },
    { offset: 36, label: '3Y Forward', color: '#8b5cf6' },
    { offset: 60, label: '5Y Forward', color: '#f97316' },
    { offset: 120, label: '10Y Forward', color: '#ef4444' }
  ];

  const datasets = series.map(s => ({
    label: s.label,
    data: filtered.map(d => getRateAtOffset(d, s.offset)),
    borderColor: s.color,
    borderWidth: 2,
    pointRadius: filtered.length > 60 ? 0 : 3,
    pointBackgroundColor: s.color,
    tension: 0.3,
    fill: false,
    spanGaps: true
  }));

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color: '#8899a6', font: { size: 12 } } },
        tooltip: {
          backgroundColor: '#1a1f2e',
          titleColor: '#fff',
          bodyColor: '#e1e8ed',
          borderColor: '#2a3040',
          borderWidth: 1
        }
      },
      scales: {
        x: { ticks: { color: '#5c6e7e', maxTicksLimit: 12 }, grid: { color: '#1e2536' } },
        y: { ticks: { color: '#5c6e7e', callback: v => v.toFixed(2) + '%' }, grid: { color: '#1e2536' } }
      }
    }
  });

  const container = document.getElementById('trendRange');
  container.innerHTML = ['1M', '3M', '6M', '1Y', 'All'].map(r =>
    `<button class="${r === range ? 'active' : ''}" onclick="renderTrendChart('${r}')">${r}</button>`
  ).join('');
}

// ─── Spread Chart ─────────────────────────────────────────────────────────────

function renderSpreadChart() {
  const ctx = document.getElementById('spreadChart').getContext('2d');
  const labels = historyData.map(d => d.date);
  const spreads = historyData.map(d => {
    const r2y = getRateAtOffset(d, 24);
    const r10y = getRateAtOffset(d, 120);
    if (r2y != null && r10y != null) return Math.round((r10y - r2y) * 100);
    return null;
  });

  const bgColors = spreads.map(s => s != null ? (s >= 0 ? 'rgba(46,204,113,0.7)' : 'rgba(231,76,60,0.7)') : 'transparent');
  const borderColors = spreads.map(s => s != null ? (s >= 0 ? '#2ecc71' : '#e74c3c') : 'transparent');

  if (spreadChart) spreadChart.destroy();
  spreadChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '2Y-10Y Spread (bps)',
        data: spreads,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8899a6' } },
        tooltip: {
          backgroundColor: '#1a1f2e',
          titleColor: '#fff',
          bodyColor: '#e1e8ed',
          borderColor: '#2a3040',
          borderWidth: 1,
          callbacks: {
            label: item => `${item.raw > 0 ? '+' : ''}${item.raw} bps ${item.raw >= 0 ? '(Normal)' : '(Inverted)'}`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#5c6e7e' }, grid: { color: '#1e2536' } },
        y: { ticks: { color: '#5c6e7e', callback: v => v + ' bps' }, grid: { color: '#1e2536' } }
      }
    }
  });
}

// ─── Rate Table ───────────────────────────────────────────────────────────────

function renderTable(prev) {
  const tbody = document.getElementById('rateTableBody');
  const curve = getCurveArray(latestData);
  const prevCurve = getCurveArray(prev);
  const prevLookup = {};
  prevCurve.forEach(pt => { prevLookup[pt.date] = pt.sofr; });

  let html = '';
  for (const pt of curve) {
    const prevRate = prevLookup[pt.date] ?? null;
    const chg = bpsChange(pt.sofr, prevRate);
    const fmt = formatBps(chg);

    html += `<tr>
      <td><strong>${pt.date}</strong></td>
      <td>${pt.year}</td>
      <td>${pt.sofr.toFixed(4)}%</td>
      <td class="${fmt.cls === 'positive' ? 'rate-up' : fmt.cls === 'negative' ? 'rate-down' : ''}">${fmt.text}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

// ─── CSV Download ─────────────────────────────────────────────────────────────

function downloadTableCSV() {
  const table = document.getElementById('rateTable');
  const rows = table.querySelectorAll('tr');
  let csv = '';
  rows.forEach(row => {
    const cells = row.querySelectorAll('th, td');
    const values = [];
    cells.forEach(cell => {
      let text = cell.textContent.trim().replace(/,/g, '');
      if (text.includes('"')) text = text.replace(/"/g, '""');
      values.push(text);
    });
    csv += values.join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sofr_rates_${latestData.date}.csv`;
  a.click();
}

// ─── Context Panel ────────────────────────────────────────────────────────────

function renderContext() {
  const panel = document.getElementById('contextPanel');
  const r3y = getRateAtOffset(latestData, 36);
  const r2y = getRateAtOffset(latestData, 24);
  const r10y = getRateAtOffset(latestData, 120);
  const spreadBps = (r2y != null && r10y != null) ? Math.round((r10y - r2y) * 100) : null;

  let capCost = '';
  if (r3y != null) {
    const costRange = r3y > 5 ? '3.5-5.0%' : r3y > 4 ? '2.0-3.5%' : r3y > 3 ? '1.0-2.0%' : '0.5-1.5%';
    capCost = `<p><strong>Cap Cost Context:</strong> With the 3Y forward rate at ${r3y.toFixed(2)}%, indicative 3-year SOFR cap premiums (at-the-money) are approximately in the <strong>${costRange}</strong> of notional range. ${r3y > 4.5 ? 'Cap costs remain elevated — consider whether a swap provides better economics.' : 'Cap costs are moderate at current rate levels.'}</p>`;
  }

  let hedgeTiming = '';
  if (spreadBps != null) {
    if (spreadBps < -10) {
      hedgeTiming = `<p><strong>Hedge Timing:</strong> The curve is inverted (${spreadBps} bps 2Y-10Y spread), indicating the market expects rates to decline. For floating-rate borrowers, this suggests near-term rates remain elevated but are expected to fall. Consider shorter-dated hedges or caps that provide protection through the high-rate period without locking in long-term at today's elevated short rates.</p>`;
    } else if (spreadBps > 25) {
      hedgeTiming = `<p><strong>Hedge Timing:</strong> The curve is positively sloped (+${spreadBps} bps 2Y-10Y spread), suggesting rates could rise over time. Locking in a longer-dated swap at current levels may offer attractive economics relative to where floating rates could trend.</p>`;
    } else {
      hedgeTiming = `<p><strong>Hedge Timing:</strong> The curve is relatively flat (${spreadBps > 0 ? '+' : ''}${spreadBps} bps 2Y-10Y spread). The cost difference between short-term and long-term hedges is minimal, giving borrowers flexibility to choose hedge tenor based on business needs rather than rate views.</p>`;
    }
  }

  panel.innerHTML = `
    <h2>Real Estate Investor Rate Context</h2>
    ${capCost}
    ${hedgeTiming}
    <p style="font-size:12px; color:#5c6e7e; margin-top:12px;">This information is for reference only and does not constitute financial advice. Consult your hedging advisor for specific trade recommendations.</p>
  `;
}

// Initialize
loadData();
</script>
